<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Starting Day for DC5</title>

<style>

*{
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}


html,body{

margin:0;
width:100%;
height:100%;
overflow:hidden;

}


body{

background:linear-gradient(135deg,#08202b,#17617c);

display:flex;
align-items:center;
justify-content:center;

padding:15px;

}



.card{

width:100%;
max-width:950px;
height:92vh;

background:white;

border-radius:28px;

padding:25px;

box-shadow:0 25px 60px #0006;

display:flex;
flex-direction:column;

}




.title{

text-align:center;

font-size:clamp(24px,5vw,40px);

color:#123746;

margin-bottom:20px;

}




/* LOGIN */

.login{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:20px;

}


.login p{

font-size:20px;
color:#555;

}


.login input{

width:90%;
max-width:500px;

padding:20px;

font-size:20px;

border-radius:16px;

border:2px solid #ddd;

}



button{

background:#123746;

color:white;

border:0;

border-radius:14px;

padding:16px 30px;

font-size:18px;

cursor:pointer;

}



button:hover{

opacity:.85;

}



/* CALENDAR */


#calendarApp{

display:none;

height:100%;

flex-direction:column;

}




.header{

display:flex;

justify-content:space-between;

align-items:center;

height:55px;

}



.calendar{

flex:1;

display:grid;

grid-template-columns:repeat(7,1fr);

grid-template-rows:repeat(6,1fr);

border:2px solid #ddd;

border-radius:18px;

overflow:hidden;

}



.box{

position:relative;

border-right:1px solid #ddd;

border-bottom:1px solid #ddd;

padding:6px;

overflow:hidden;

background:#fafcff;

}


.box:nth-child(7n){

border-right:none;

}



.number{

font-weight:bold;

}



.disabled{

background:#eee;

color:#999;

pointer-events:none;

}



.people{

position:absolute;

top:25px;

bottom:5px;

left:5px;

right:5px;

overflow:auto;

}




.person{

background:#123746;

color:white;

border-radius:8px;

font-size:12px;

padding:5px;

margin-bottom:4px;

display:flex;

justify-content:space-between;

align-items:center;

}




.delete{

background:#e74c3c;

padding:3px 7px;

font-size:10px;

}



.admin{

background:#ffe3e3;

padding:10px;

border-radius:12px;

margin-bottom:10px;

}



@media(max-width:600px){


.card{

height:95vh;

padding:15px;

}


.login input{

font-size:17px;

}


.box{

padding:3px;

}


.person{

font-size:9px;

}


.title{

font-size:25px;

}


}

</style>


</head>


<body>


<div class="card">



<div class="title">
Starting Day for DC5 🚀
</div>




<div id="loginScreen" class="login">


<p>
Enter your name to continue
</p>


<input 
id="nameInput"
placeholder="Your name">


<button id="enterButton">
Enter Calendar
</button>


</div>






<div id="calendarApp">



<div id="adminPanel"></div>



<div class="header">


<button id="prevBtn">
◀
</button>


<h2 id="monthTitle"></h2>


<button id="nextBtn">
▶
</button>


</div>



<div class="calendar" id="calendar"></div>



</div>





</div>







<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";


import {

getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";





const firebaseConfig={


apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:d56a37c93bf49f4c8b5bc8"

};




const app=initializeApp(firebaseConfig);

const db=getFirestore(app);




let username="";

let admin=false;

let current=new Date();

let bookings=[];




document
.getElementById("enterButton")
.onclick=()=>{


username=document
.getElementById("nameInput")
.value
.trim();



if(!username){

alert("Enter your name");

return;

}



admin=username.toLowerCase()=="admin";



document.getElementById("loginScreen")
.style.display="none";


document.getElementById("calendarApp")
.style.display="flex";




if(admin){


document.getElementById("adminPanel")
.innerHTML=

`
<div class="admin">

<b>Admin Mode</b><br><br>

<button id="clearBtn">
Clear All
</button>

</div>
`;



document
.getElementById("clearBtn")
.onclick=clearAll;


}



draw();


};







function draw(){


let calendar=
document.getElementById("calendar");


calendar.innerHTML="";



document
.getElementById("monthTitle")
.innerText=current.toLocaleString(
"default",
{
month:"long",
year:"numeric"
}
);




let today=new Date();

today.setHours(0,0,0,0);




let first=new Date(
current.getFullYear(),
current.getMonth(),
1
).getDay();



for(let i=0;i<first;i++){

calendar.innerHTML+="<div></div>";

}



let total=new Date(
current.getFullYear(),
current.getMonth()+1,
0
).getDate();





for(let d=1;d<=total;d++){



let box=document.createElement("div");

box.className="box";



let date=new Date(
current.getFullYear(),
current.getMonth(),
d
);



date.setHours(0,0,0,0);



if(date<today){

box.classList.add("disabled");

}



box.innerHTML=

`

<div class="number">${d}</div>

<div class="people"></div>

`;



let people=box.querySelector(".people");




bookings.forEach(b=>{


let saved=new Date(b.date);



if(

saved.getDate()==d &&

saved.getMonth()==current.getMonth() &&

saved.getFullYear()==current.getFullYear()

){



let p=document.createElement("div");

p.className="person";


p.innerHTML=b.name;



if(admin || b.name==username){


let x=document.createElement("button");

x.className="delete";

x.innerText="X";


x.onclick=()=>removeBooking(b);


p.appendChild(x);


}



people.appendChild(p);



}



});




if(date>=today){

box.onclick=()=>addBooking(d);

}



calendar.appendChild(box);


}



}




document
.getElementById("nextBtn")
.onclick=()=>{

current.setMonth(current.getMonth()+1);

draw();

};



document
.getElementById("prevBtn")
.onclick=()=>{

let now=new Date();

if(
current.getMonth()==now.getMonth()
&&
current.getFullYear()==now.getFullYear()
)return;


current.setMonth(current.getMonth()-1);

draw();

};





async function addBooking(day){


await addDoc(
collection(db,"startingDays"),
{

name:username,

date:new Date(
current.getFullYear(),
current.getMonth(),
day
).toISOString()

});

}





async function removeBooking(b){


if(
!admin &&
b.name!=username
){

return;

}


await deleteDoc(
doc(db,"startingDays",b.id)
);


}





async function clearAll(){


let snap=await getDocs(
collection(db,"startingDays")
);


snap.forEach(d=>

deleteDoc(
doc(db,"startingDays",d.id)
)

);


}






onSnapshot(

collection(db,"startingDays"),

snap=>{


bookings=[];


snap.forEach(d=>{

bookings.push({

id:d.id,

...d.data()

});

});


draw();


});


</script>


</body>

</html>
