<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Starting Day for DC5</title>


<style>

*{
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}


body{

margin:0;
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#2c5364);
display:flex;
justify-content:center;
align-items:center;

}


.card{

background:white;
width:95%;
max-width:1000px;
padding:30px;
border-radius:25px;
box-shadow:0 20px 50px #0005;

}


h1{

text-align:center;
color:#203a43;

}


input{

width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;

}


button{

background:#203a43;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;

}


button:hover{

opacity:.85;

}



.header{

display:flex;
justify-content:space-between;
align-items:center;

margin:20px 0;

}



.calendar{

display:grid;
grid-template-columns:repeat(7,1fr);
border:2px solid #ddd;

}



.box{

min-height:120px;
border-right:1px solid #ddd;
border-bottom:1px solid #ddd;
padding:8px;
background:#fafafa;

}



.box:hover{

background:#eef5ff;

}



.disabled{

background:#e8e8e8;
color:#999;
pointer-events:none;

}



.number{

font-weight:bold;
font-size:18px;

}



.person{

margin-top:8px;
background:#203a43;
color:white;
padding:5px;
border-radius:8px;

display:flex;
justify-content:space-between;
align-items:center;

font-size:13px;

}



.delete{

background:#e74c3c;
padding:3px 7px;
font-size:11px;

}



.admin{

background:#ffe2e2;
padding:15px;
border-radius:12px;
margin-bottom:15px;

}


</style>


</head>


<body>


<div class="card">


<div id="login">


<h1>Starting Day for DC5 🚀</h1>


<p>Enter your name</p>


<input id="name" placeholder="Your name">


<br><br>


<button onclick="start()">
Enter Calendar
</button>


</div>





<div id="app" style="display:none">


<h1>Starting Day for DC5 🚀</h1>


<div id="adminPanel"></div>



<div class="header">


<button onclick="monthMove(-1)">
◀
</button>


<h2 id="title"></h2>


<button onclick="monthMove(1)">
▶
</button>


</div>




<div class="calendar" id="calendar"></div>


</div>


</div>







<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";



import {

getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";





const firebaseConfig={


apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:d56a37c93bf49f4c8b5bc8"


};





const app=initializeApp(firebaseConfig);


const db=getFirestore(app);





let username="";

let admin=false;

let current=new Date();

let bookings=[];






window.start=function(){



username=document.getElementById("name").value.trim();



if(!username){

alert("Enter your name");

return;

}



admin=username.toLowerCase()=="admin";



document.getElementById("login").style.display="none";

document.getElementById("app").style.display="block";



if(admin){


document.getElementById("adminPanel").innerHTML=

`

<div class="admin">

<b>ADMIN MODE</b><br><br>

<button onclick="clearAll()">
Clear Entire List
</button>

</div>

`;

}



draw();


}








function draw(){



let calendar=document.getElementById("calendar");


calendar.innerHTML="";



let today=new Date();


today.setHours(0,0,0,0);





document.getElementById("title").innerText=

current.toLocaleString(
"default",
{
month:"long",
year:"numeric"
}
);





let back =
document.querySelector(".header button:first-child");



if(

current.getFullYear()==today.getFullYear()

&&

current.getMonth()==today.getMonth()

){

back.disabled=true;

}

else{

back.disabled=false;

}






let first=

new Date(
current.getFullYear(),
current.getMonth(),
1
).getDay();




for(let i=0;i<first;i++){

calendar.innerHTML+="<div></div>";

}





let total=

new Date(
current.getFullYear(),
current.getMonth()+1,
0
).getDate();






for(let d=1;d<=total;d++){



let box=document.createElement("div");


box.className="box";



let date=new Date(

current.getFullYear(),
current.getMonth(),
d

);



date.setHours(0,0,0,0);





if(date < today){

box.classList.add("disabled");

}



box.innerHTML=

`

<div class="number">${d}</div>

`;







bookings.forEach(b=>{



let saved=new Date(b.date);



if(

saved.getDate()==d &&

saved.getMonth()==current.getMonth() &&

saved.getFullYear()==current.getFullYear()

){



let person=document.createElement("div");


person.className="person";



person.innerHTML=

`

<span>${b.name}</span>

`;




if(

b.name==username ||

admin

){


let x=document.createElement("button");


x.className="delete";

x.innerText="X";



x.onclick=(e)=>{

e.stopPropagation();

removeBooking(b);

};



person.appendChild(x);


}



box.appendChild(person);



}




});





if(date >= today){


box.onclick=()=>addBooking(d);


}



calendar.appendChild(box);



}



}







window.monthMove=function(amount){



let next=new Date(current);



next.setMonth(
next.getMonth()+amount
);



let today=new Date();



if(

next.getFullYear()<today.getFullYear()

||

(

next.getFullYear()==today.getFullYear()

&&

next.getMonth()<today.getMonth()

)

){

return;

}




current=next;


draw();



}








async function addBooking(day){



let chosen=new Date(

current.getFullYear(),

current.getMonth(),

day

);





await addDoc(

collection(db,"startingDays"),

{

name:username,

date:chosen.toISOString(),

created:Date.now()

}

);



}







async function removeBooking(b){



if(

b.name!=username && !admin

){

alert("You can only delete your own booking");

return;

}



await deleteDoc(

doc(db,"startingDays",b.id)

);



}








window.clearAll=async function(){



if(!admin)return;



if(!confirm("Delete everything?"))
return;




let snap=await getDocs(

collection(db,"startingDays")

);




snap.forEach(async d=>{


await deleteDoc(

doc(db,"startingDays",d.id)

);


});


}









onSnapshot(

collection(db,"startingDays"),

snapshot=>{


bookings=[];



snapshot.forEach(d=>{


bookings.push({

id:d.id,

...d.data()

});


});



draw();



}

);





</script>


</body>

</html>
