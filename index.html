<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Starting Day for DC5</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');


*{
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}


body{

margin:0;
height:100vh;

background:linear-gradient(135deg,#061923,#16758a);

display:flex;
align-items:center;
justify-content:center;

padding:20px;

}



.container{

width:100%;
max-width:1150px;
height:90vh;

background:#ffffffee;

border-radius:30px;

padding:25px;

box-shadow:0 30px 70px #0007;

display:flex;
flex-direction:column;

}



h1{

text-align:center;

color:#092f3d;

margin:0;

font-size:clamp(25px,5vw,42px);

}



.subtitle{

text-align:center;
color:#64748b;

margin-bottom:20px;

}




#login{

flex:1;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

gap:20px;

}



input{

width:min(500px,90%);

padding:18px;

font-size:18px;

border-radius:16px;

border:2px solid #ddd;

}



button{

background:#092f3d;

color:white;

border:0;

border-radius:12px;

padding:12px 18px;

cursor:pointer;

font-weight:700;

}



button:hover{

opacity:.85;

}





#calendarApp{

display:none;

flex:1;

min-height:0;

}





.layout{

display:flex;

height:100%;

gap:20px;

}




.sidebar{

width:220px;

background:#f1f7fa;

border-radius:20px;

padding:20px;

display:flex;

flex-direction:column;

gap:15px;

}



.sidebar h3{

margin:0;

color:#092f3d;

}



.adminBox{

background:#fff1f2;

padding:15px;

border-radius:15px;

}




.calendarArea{

flex:1;

display:flex;

flex-direction:column;

min-width:0;

}




.toolbar{

display:flex;

justify-content:space-between;

align-items:center;

height:50px;

}




.month{

font-size:24px;

font-weight:800;

color:#092f3d;

}





.weekdays{

display:grid;

grid-template-columns:repeat(7,1fr);

text-align:center;

font-weight:bold;

color:#64748b;

margin-bottom:8px;

}




.calendar{

flex:1;

display:grid;

grid-template-columns:repeat(7,1fr);

grid-template-rows:repeat(6,1fr);

border:1px solid #dbe5ea;

border-radius:20px;

overflow:hidden;

}





.box{

position:relative;

border-right:1px solid #e5edf2;

border-bottom:1px solid #e5edf2;

padding:8px;

background:white;

}



.box:hover:not(.disabled){

background:#eefaff;

cursor:pointer;

}



.box:hover:not(.disabled)::after{

content:"+ Add";

position:absolute;

right:8px;

bottom:8px;

background:#092f3d;

color:white;

font-size:11px;

padding:5px 8px;

border-radius:20px;

}




.number{

font-weight:800;

color:#092f3d;

}



.disabled{

background:#eee;

color:#999;

pointer-events:none;

}



.people{

position:absolute;

top:30px;

bottom:5px;

left:5px;

right:5px;

overflow:auto;

}



.person{

background:#092f3d;

color:white;

border-radius:9px;

padding:5px;

margin-bottom:5px;

font-size:12px;

display:flex;

justify-content:space-between;

align-items:center;

}



.delete{

background:#ef4444;

padding:2px 7px;

}



@media(max-width:750px){


.container{

height:95vh;

padding:15px;

}


.layout{

flex-direction:column;

}



.sidebar{

width:100%;

height:auto;

}



.calendar{

min-height:400px;

}



.person{

font-size:9px;

}


}



</style>

</head>




<body>


<div class="container">


<h1>
Starting Day for DC5 🚀
</h1>


<div class="subtitle">
Choose your starting day
</div>



<div id="login">


<input id="nameInput"
placeholder="Your name">


<button id="enterButton">
Enter Calendar
</button>


</div>







<div id="calendarApp">


<div class="layout">





<div class="sidebar">


<h3>
Menu
</h3>


<div id="adminPanel">


</div>


</div>





<div class="calendarArea">



<div class="toolbar">


<button id="prevBtn">
←
</button>


<div class="month" id="monthTitle"></div>


<button id="nextBtn">
→
</button>


</div>




<div class="weekdays">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>




<div id="calendar" class="calendar"></div>




</div>


</div>


</div>

</div>





<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";


import {

getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";



const firebaseConfig={


apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:d56a37c93bf49f4c8b5bc8"

};


const app=initializeApp(firebaseConfig);

const db=getFirestore(app);



let username="";

let admin=false;

let current=new Date();

let bookings=[];



enterButton.onclick=()=>{


username=nameInput.value.trim();


if(!username)return;



admin=username.toLowerCase()=="admin";


login.style.display="none";

calendarApp.style.display="block";



if(admin){


adminPanel.innerHTML=

`

<div class="adminBox">

<b>Admin Mode</b>

<br><br>

<button id="clearBtn">
Clear All
</button>

</div>

`;



clearBtn.onclick=clearAll;


}



draw();

};





function draw(){


calendar.innerHTML="";


monthTitle.innerText=current.toLocaleString(

"default",

{
month:"long",
year:"numeric"
}

);



let today=new Date();

today.setHours(0,0,0,0);



let first=new Date(

current.getFullYear(),
current.getMonth(),
1

).getDay();



for(let i=0;i<first;i++)
calendar.innerHTML+="<div></div>";



let days=new Date(

current.getFullYear(),
current.getMonth()+1,
0

).getDate();



for(let d=1;d<=days;d++){



let box=document.createElement("div");

box.className="box";



let date=new Date(

current.getFullYear(),
current.getMonth(),
d

);



if(date<today)
box.classList.add("disabled");



box.innerHTML=

`

<div class="number">${d}</div>

<div class="people"></div>

`;



let people=box.querySelector(".people");



bookings.forEach(b=>{


let bd=new Date(b.date);



if(

bd.getDate()==d &&
bd.getMonth()==current.getMonth() &&
bd.getFullYear()==current.getFullYear()

){


let p=document.createElement("div");


p.className="person";


p.innerHTML=b.name;



if(admin||b.name==username){


let x=document.createElement("button");


x.className="delete";

x.innerText="×";


x.onclick=e=>{

e.stopPropagation();

removeBooking(b);

};



p.appendChild(x);

}


people.appendChild(p);


}


});



box.onclick=()=>{

if(!box.classList.contains("disabled"))
addBooking(d);

};



calendar.appendChild(box);



}


}





prevBtn.onclick=()=>{


let now=new Date();


if(current<=new Date(now.getFullYear(),now.getMonth(),1))
return;


current.setMonth(current.getMonth()-1);


draw();

};



nextBtn.onclick=()=>{


current.setMonth(current.getMonth()+1);

draw();


};




async function addBooking(day){


await addDoc(

collection(db,"startingDays"),

{

name:username,

date:new Date(

current.getFullYear(),
current.getMonth(),
day

).toISOString()

});

}




async function removeBooking(b){


if(!admin&&b.name!=username)return;


await deleteDoc(

doc(db,"startingDays",b.id)

);


}




async function clearAll(){


let snap=await getDocs(

collection(db,"startingDays")

);


snap.forEach(d=>

deleteDoc(
doc(db,"startingDays",d.id)
)

);


}




onSnapshot(

collection(db,"startingDays"),

snap=>{


bookings=[];


snap.forEach(d=>{


bookings.push({

id:d.id,

...d.data()

});


});


draw();


});


</script>


</body>
</html>
