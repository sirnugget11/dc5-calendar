<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon"
href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    
<title>Starting Day for DC5</title>


<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');


*{
box-sizing:border-box;
font-family:Inter,sans-serif;
}


body{

margin:0;
height:100vh;

background:linear-gradient(135deg,#061923,#16758a);

display:flex;
justify-content:center;
align-items:center;

padding:15px;

}



.container{

width:100%;
max-width:1200px;

height:90vh;

background:white;

border-radius:28px;

padding:25px;

box-shadow:0 30px 70px #0008;

display:flex;

flex-direction:column;

}



h1{

text-align:center;

color:#092f3d;

margin:0;

}



.subtitle{

text-align:center;

color:#64748b;

margin-bottom:20px;

}




#login{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:20px;

}

#warning{
    text-align:center;
    color:#dc2626;
    font-weight:bold;
    min-height:24px;
    margin-bottom:12px;
    opacity:0;
    transition:.25s;
}

#warning.show{
    opacity:1;
}

input,textarea{

padding:14px;

border-radius:14px;

border:2px solid #dbe5ea;

font-size:16px;

width:100%;

}



textarea{

height:90px;

}



button{

background:#092f3d;

color:white;

border:0;

border-radius:12px;

padding:12px 18px;

cursor:pointer;

font-weight:bold;

}



button:hover{

opacity:.85;

}





#calendarApp{

display:none;

height:100%;

}



.layout{

display:flex;

height:100%;

gap:20px;

}




.sidebar{

width:250px;

background:#f1f7fa;

border-radius:20px;

padding:20px;

}



.sidebar h2{

color:#092f3d;

}




#menuDescription{

color:#475569;

line-height:1.5;

}




.adminBox{

margin-top:20px;

background:#ffe7eb;

padding:15px;

border-radius:15px;

}




.main{

flex:1;

display:flex;

flex-direction:column;

}





.toolbar{

display:flex;

justify-content:space-between;

align-items:center;

}




.month{

font-size:24px;

font-weight:800;

color:#092f3d;

}





.weekdays{

display:grid;

grid-template-columns:repeat(7,1fr);

text-align:center;

font-weight:bold;

color:#64748b;

}



.calendar{

flex:1;

display:grid;

grid-template-columns:repeat(7,1fr);

grid-template-rows:repeat(6,1fr);

border:1px solid #ddd;

border-radius:20px;

overflow:hidden;

}




.box{

position:relative;

padding:8px;

border-right:1px solid #ddd;

border-bottom:1px solid #ddd;

background:#fff;

}



.box:hover:not(.disabled){
    background:#eefaff;
}

.dayHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.addBtn{
    padding:2px 8px;
    font-size:12px;
    border-radius:8px;
    background:#092f3d;
    color:white;
    border:0;
    cursor:pointer;
}

.addBtn:hover{
    opacity:.85;
}



.disabled{

background:#eee;

pointer-events:none;

}



.people{

position:absolute;

top:25px;

bottom:5px;

left:5px;

right:5px;

overflow:auto;

}




.person{

background:#092f3d;

color:white;

border-radius:8px;

padding:5px;

margin-bottom:5px;

font-size:12px;

display:flex;

justify-content:space-between;

}




.delete{

background:#ef4444;

padding:3px 8px;

}





@media(max-width:750px){


.layout{

flex-direction:column;

}



.sidebar{

width:100%;

}



.calendar{

min-height:400px;

}


}



</style>


</head>




<body>


<div class="container">


<h1>
Starting Day for DC5 🚀
</h1>


<div class="subtitle">
Choose your starting day
</div>

<div id="warning"></div>





<div id="login">


<input id="nameInput" placeholder="Your name">


<button id="enterButton">
Enter Calendar
</button>


</div>








<div id="calendarApp">



<div class="layout">



<div class="sidebar">


<h2 id="menuTitle">
Information
</h2>


<p id="menuDescription">
No information yet.
</p>




<div id="adminControls"></div>



</div>







<div class="main">



<div class="toolbar">


<button id="prevBtn">
←
</button>



<div class="month" id="monthTitle"></div>



<button id="nextBtn">
→
</button>



</div>





<div class="weekdays">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>




<div id="calendar" class="calendar"></div>




</div>




</div>


</div>



</div>









<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";



import {

getFirestore,
collection,
doc,
setDoc,
addDoc,
deleteDoc,
getDocs,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";





const firebaseConfig={


apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:d56a37c93bf49f4c8b5bc8"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);




let username="";

let admin=false;

let current=new Date();

let bookings=[];





enterButton.onclick=()=>{


username=nameInput.value.trim();


if(!username)return;


admin=username.toLowerCase()=="admin";



login.style.display="none";

calendarApp.style.display="block";



if(admin){


adminControls.innerHTML=`

<div class="adminBox">

<input id="menuInput" placeholder="Menu title">


<textarea id="descInput" placeholder="Description"></textarea>


<button id="saveBtn">
Save Menu
</button>


<button id="clearBtn">
Clear All
</button>


</div>

`;



saveBtn.onclick=saveMenu;

clearBtn.onclick=clearAll;


}


draw();


};






async function saveMenu(){


let title=
document.getElementById("menuInput").value.trim();


let description=
document.getElementById("descInput").value.trim();



if(!title||!description){

alert("Fill everything");

return;

}



await setDoc(

doc(db,"settings","menu"),

{

title,

description

}

);


alert("Saved");


}






async function clearAll(){


let snap=await getDocs(
collection(db,"startingDays")
);



snap.forEach(x=>

deleteDoc(
doc(db,"startingDays",x.id)
)

);


}




function showWarning(text){

    warning.innerText = text;
    warning.classList.add("show");

    clearTimeout(showWarning.timer);

    showWarning.timer = setTimeout(() => {
        warning.classList.remove("show");
        warning.innerText = "";
    },3000);

}


async function addBooking(day){

    const selectedDate = new Date(
        current.getFullYear(),
        current.getMonth(),
        day
    ).toISOString();

    // Check if this user already exists on this day
    const alreadyBooked = bookings.some(b =>
        b.name.toLowerCase() === username.toLowerCase() &&
        new Date(b.date).toDateString() === new Date(selectedDate).toDateString()
    );

    if(alreadyBooked){
        showWarning("⚠️ You are already signed up for this day.");
        return;
    }

    await addDoc(
        collection(db,"startingDays"),
        {
            name:username,
            date:selectedDate
        }
    );

}






async function removeBooking(b){


if(!admin && b.name!=username)
return;


await deleteDoc(

doc(db,"startingDays",b.id)

);


}







function draw(){


calendar.innerHTML="";



monthTitle.innerText=current.toLocaleString(

"default",

{

month:"long",

year:"numeric"

}

);



let first=new Date(

current.getFullYear(),

current.getMonth(),

1

).getDay();




for(let i=0;i<first;i++)
calendar.innerHTML+="<div></div>";



let total=new Date(

current.getFullYear(),

current.getMonth()+1,

0

).getDate();





for(let d=1;d<=total;d++){


let box=document.createElement("div");

box.className="box";


box.innerHTML=`

<div class="dayHeader">
    <span>${d}</span>
    <button class="addBtn">+</button>
</div>

<div class="people"></div>

`;



let date=new Date(

current.getFullYear(),

current.getMonth(),

d

);



if(date<new Date().setHours(0,0,0,0))

box.classList.add("disabled");

if(box.classList.contains("disabled")){
    box.querySelector(".addBtn").style.display="none";
}


let people=box.querySelector(".people");

const addBtn = box.querySelector(".addBtn");

addBtn.onclick = (e) => {

    e.stopPropagation();

    if(box.classList.contains("disabled")) return;

    addBooking(d);

};

bookings.forEach(b=>{


let bd=new Date(b.date);



if(

bd.getDate()==d &&

bd.getMonth()==current.getMonth() &&

bd.getFullYear()==current.getFullYear()

){


let p=document.createElement("div");

p.className="person";


p.innerHTML=b.name;



if(admin||b.name==username){


let x=document.createElement("button");

x.className="delete";

x.innerText="×";


x.onclick=e=>{

e.stopPropagation();

removeBooking(b);

};


p.appendChild(x);

}



people.appendChild(p);


}


});




calendar.appendChild(box);


}


}






prevBtn.onclick=()=>{

current.setMonth(current.getMonth()-1);

draw();

};



nextBtn.onclick=()=>{

current.setMonth(current.getMonth()+1);

draw();

};






onSnapshot(

collection(db,"startingDays"),

snap=>{


bookings=[];


snap.forEach(d=>{

bookings.push({

id:d.id,

...d.data()

});

});


draw();


}

);






onSnapshot(

doc(db,"settings","menu"),

snap=>{


if(snap.exists()){


menuTitle.innerText=snap.data().title;

menuDescription.innerText=snap.data().description;


}


}

);



</script>


</body>

</html>
