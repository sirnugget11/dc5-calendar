<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Starting Day for DC5</title>


<style>

*{
box-sizing:border-box;
font-family:'Inter','Segoe UI',Arial,sans-serif;
}


body{

margin:0;
height:100vh;
overflow:hidden;

background:
linear-gradient(135deg,#071e2b,#0f6b7c);

display:flex;
align-items:center;
justify-content:center;

padding:15px;

}



.card{

width:100%;
max-width:950px;
height:92vh;

background:#ffffffee;

border-radius:30px;

padding:25px;

box-shadow:
0 30px 70px #0005;

backdrop-filter:blur(10px);

}




.title{

text-align:center;

font-size:clamp(26px,5vw,42px);

font-weight:800;

color:#0b3445;

}



input{

width:90%;
max-width:500px;

padding:18px;

font-size:20px;

border-radius:18px;

border:2px solid #dbe5ea;

outline:none;

}




button{

background:#0b3445;

color:white;

border:none;

border-radius:14px;

padding:13px 22px;

cursor:pointer;

font-weight:600;

}



button:hover{

transform:scale(1.04);

}



.login{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:25px;

}





#calendarApp{

display:none;

height:100%;

flex-direction:column;

}




.header{

height:55px;

display:flex;

align-items:center;

justify-content:space-between;

}



.calendar{

flex:1;

display:grid;

grid-template-columns:repeat(7,1fr);

grid-template-rows:repeat(6,1fr);

border:2px solid #dce5ea;

border-radius:20px;

overflow:hidden;

}





.box{

position:relative;

background:#fbfdff;

border-right:1px solid #dce5ea;

border-bottom:1px solid #dce5ea;

padding:8px;

transition:.2s;

}



.box:hover:not(.disabled){

background:#eaf8ff;

cursor:pointer;

}



.box:hover:not(.disabled)::after{

content:"＋ Add";

position:absolute;

right:8px;

bottom:8px;

background:#0b3445;

color:white;

font-size:11px;

padding:4px 8px;

border-radius:10px;

}



.number{

font-weight:800;

color:#0b3445;

}




.disabled{

background:#eeeeee;

color:#999;

pointer-events:none;

}





.people{

position:absolute;

top:30px;

left:5px;

right:5px;

bottom:5px;

overflow:auto;

}





.person{

background:#0b3445;

color:white;

border-radius:10px;

padding:5px;

margin-bottom:5px;

font-size:12px;

display:flex;

justify-content:space-between;

align-items:center;

}




.delete{

background:#ff4d5d;

padding:3px 8px;

font-size:11px;

border-radius:8px;

}



.delete:hover{

background:#c90018;

}



.admin{

background:#ffe5e8;

padding:12px;

border-radius:15px;

}





@media(max-width:600px){


.card{

height:95vh;

padding:12px;

}


.person{

font-size:9px;

}


.box{

padding:4px;

}


.number{

font-size:12px;

}


}


</style>


</head>



<body>


<div class="card">


<div class="title">
Starting Day for DC5 🚀
</div>




<div id="login" class="login">


<input id="nameInput"
placeholder="Enter your name">


<button id="enterButton">

Enter Calendar

</button>


</div>





<div id="calendarApp">



<div id="adminPanel"></div>



<div class="header">


<button id="prevBtn">
◀
</button>


<h2 id="monthTitle"></h2>


<button id="nextBtn">
▶
</button>


</div>



<div class="calendar" id="calendar"></div>



</div>



</div>





<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";



import {

getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";




const firebaseConfig={

apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:d56a37c93bf49f4c8b5bc8"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);





let username="";

let admin=false;

let current=new Date();

let bookings=[];




document
.getElementById("enterButton")
.onclick=()=>{


username=
document.getElementById("nameInput")
.value.trim();



if(!username){

alert("Enter your name");

return;

}



admin=username.toLowerCase()=="admin";



login.style.display="none";

calendarApp.style.display="flex";



if(admin){

adminPanel.innerHTML=

`

<div class="admin">

<b>ADMIN MODE</b><br><br>

<button id="clear">
Clear All
</button>

</div>

`;


document
.getElementById("clear")
.onclick=clearAll;

}


draw();


};







function draw(){


calendar.innerHTML="";


monthTitle.innerText=current.toLocaleString(

"default",
{
month:"long",
year:"numeric"
}

);




let today=new Date();

today.setHours(0,0,0,0);



let first=new Date(
current.getFullYear(),
current.getMonth(),
1
).getDay();





for(let i=0;i<first;i++)
calendar.innerHTML+="<div></div>";





let days=new Date(

current.getFullYear(),
current.getMonth()+1,
0

).getDate();






for(let d=1;d<=days;d++){



let box=document.createElement("div");

box.className="box";



let date=new Date(
current.getFullYear(),
current.getMonth(),
d
);



date.setHours(0,0,0,0);



box.innerHTML=

`
<div class="number">${d}</div>
<div class="people"></div>
`;



if(date<today){

box.classList.add("disabled");

}




box.onclick=()=>{

if(!box.classList.contains("disabled"))
addBooking(d);

};






let people=
box.querySelector(".people");



bookings.forEach(b=>{


let saved=new Date(b.date);



if(

saved.getDate()==d &&
saved.getMonth()==current.getMonth() &&
saved.getFullYear()==current.getFullYear()

){



let p=document.createElement("div");

p.className="person";


p.innerHTML=

`

<span>${b.name}</span>

`;



if(admin || b.name==username){


let x=document.createElement("button");


x.className="delete";

x.innerText="X";



x.onclick=(e)=>{

e.stopPropagation();

removeBooking(b);

};



p.appendChild(x);


}



people.appendChild(p);



}



});



calendar.appendChild(box);



}



}






prevBtn.onclick=()=>{


let now=new Date();


if(

current.getMonth()==now.getMonth()
&&
current.getFullYear()==now.getFullYear()

)return;



current.setMonth(current.getMonth()-1);


draw();


};






nextBtn.onclick=()=>{

current.setMonth(current.getMonth()+1);

draw();

};







async function addBooking(day){


await addDoc(

collection(db,"startingDays"),

{

name:username,

date:new Date(

current.getFullYear(),
current.getMonth(),
day

).toISOString()

});


}







async function removeBooking(b){


if(!admin && b.name!=username){

return;

}


await deleteDoc(

doc(db,"startingDays",b.id)

);


}






async function clearAll(){


let snap=await getDocs(
collection(db,"startingDays")
);


snap.forEach(d=>

deleteDoc(
doc(db,"startingDays",d.id)
)

);


}







onSnapshot(

collection(db,"startingDays"),

snap=>{


bookings=[];


snap.forEach(d=>{

bookings.push({

id:d.id,

...d.data()

});

});


draw();

});


</script>


</body>
</html>
