<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Starting Day for DC5</title>


<style>

*{
box-sizing:border-box;
font-family:Inter,Segoe UI,Arial,sans-serif;
}


body{

margin:0;
min-height:100vh;

background:
linear-gradient(135deg,#081f2c,#14506b);

display:flex;
justify-content:center;
align-items:center;

padding:15px;

}



.card{

width:100%;
max-width:900px;

height:min(90vh,850px);

background:white;

border-radius:28px;

padding:25px;

box-shadow:
0 25px 60px rgba(0,0,0,.35);

overflow:hidden;

}



h1{

text-align:center;
margin:0 0 20px;

color:#123746;

font-size:clamp(22px,5vw,34px);

}



input{

width:100%;

padding:14px;

border-radius:14px;

border:2px solid #ddd;

font-size:16px;

}



button{

border:0;

background:#123746;

color:white;

border-radius:12px;

padding:12px 18px;

cursor:pointer;

}



button:hover{

opacity:.85;

}




.header{

height:55px;

display:flex;

justify-content:space-between;

align-items:center;

}



#title{

font-size:clamp(18px,4vw,25px);

}



.calendar{

height:calc(100% - 140px);

display:grid;

grid-template-columns:repeat(7,1fr);

grid-template-rows:repeat(6,1fr);

border:2px solid #ddd;

border-radius:18px;

overflow:hidden;

}




.box{

position:relative;

border-right:1px solid #ddd;

border-bottom:1px solid #ddd;

padding:8px;

background:#fbfdff;

overflow:hidden;

}



.box:hover{

background:#f0f7ff;

}




.number{

font-weight:bold;

color:#123746;

font-size:16px;

}



.disabled{

background:#eee;

color:#999;

pointer-events:none;

}





.people{

position:absolute;

left:6px;
right:6px;

top:30px;
bottom:6px;

overflow-y:auto;

}




.person{

background:#123746;

color:white;

border-radius:10px;

padding:5px;

margin-bottom:5px;

font-size:12px;

display:flex;

align-items:center;

justify-content:space-between;

gap:5px;

}



.delete{

background:#e74c3c;

padding:3px 7px;

font-size:11px;

}





.admin{

background:#ffe7e7;

padding:12px;

border-radius:14px;

margin-bottom:10px;

}



@media(max-width:600px){


.card{

height:95vh;

padding:15px;

border-radius:20px;

}


.calendar{

height:calc(100% - 120px);

}


.box{

padding:5px;

}


.number{

font-size:13px;

}


.person{

font-size:10px;

padding:3px;

}



button{

padding:10px;

}



}



</style>

</head>




<body>


<div class="card">



<div id="login">


<h1>
Starting Day for DC5 🚀
</h1>


<input 
id="name"
placeholder="Enter your name">



<br><br>


<button onclick="start()">

Enter Calendar

</button>


</div>






<div id="app" style="display:none">


<h1>
Starting Day for DC5 🚀
</h1>



<div id="adminPanel"></div>




<div class="header">


<button onclick="monthMove(-1)">
◀
</button>


<h2 id="title"></h2>


<button onclick="monthMove(1)">
▶
</button>


</div>




<div class="calendar" id="calendar"></div>




</div>


</div>






<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";



import {

getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";





const firebaseConfig={


apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:d56a37c93bf49f4c8b5bc8"

};




const app=initializeApp(firebaseConfig);


const db=getFirestore(app);



let username="";

let admin=false;

let current=new Date();

let bookings=[];







window.start=function(){


username=document
.getElementById("name")
.value
.trim();



if(!username){

alert("Enter name");

return;

}



admin=username.toLowerCase()=="admin";



document.getElementById("login").style.display="none";

document.getElementById("app").style.display="block";




if(admin){


adminPanel.innerHTML=

`

<div class="admin">

<b>Admin Mode</b><br><br>

<button onclick="clearAll()">

Clear Everything

</button>

</div>

`;

}



draw();


}








function draw(){


let cal=document.getElementById("calendar");


cal.innerHTML="";



let today=new Date();

today.setHours(0,0,0,0);



title.innerText=current.toLocaleString(
"default",
{
month:"long",
year:"numeric"
}
);




let first=new Date(
current.getFullYear(),
current.getMonth(),
1
).getDay();





for(let i=0;i<first;i++){

cal.innerHTML+="<div></div>";

}





let total=new Date(

current.getFullYear(),
current.getMonth()+1,
0

).getDate();





for(let d=1;d<=total;d++){



let box=document.createElement("div");

box.className="box";



let date=new Date(
current.getFullYear(),
current.getMonth(),
d
);



date.setHours(0,0,0,0);



box.innerHTML=

`

<div class="number">${d}</div>

<div class="people"></div>

`;



if(date<today){

box.classList.add("disabled");

}



let people=box.querySelector(".people");




bookings.forEach(b=>{


let bd=new Date(b.date);



if(

bd.getDate()==d &&

bd.getMonth()==current.getMonth() &&

bd.getFullYear()==current.getFullYear()

){



let p=document.createElement("div");


p.className="person";


p.innerHTML=

`
<span>${b.name}</span>
`;



if(

b.name==username ||
admin

){


let x=document.createElement("button");


x.className="delete";

x.innerText="X";

x.onclick=(e)=>{

e.stopPropagation();

removeBooking(b);

};



p.appendChild(x);

}




people.appendChild(p);



}



});




if(date>=today){

box.onclick=()=>addBooking(d);

}



cal.appendChild(box);



}




}





window.monthMove=function(x){


let n=new Date(current);


n.setMonth(n.getMonth()+x);



let now=new Date();



if(n < new Date(now.getFullYear(),now.getMonth(),1))
return;



current=n;


draw();


}







async function addBooking(day){


let d=new Date(

current.getFullYear(),
current.getMonth(),
day

);



await addDoc(

collection(db,"startingDays"),

{

name:username,

date:d.toISOString(),

}

);



}





async function removeBooking(b){


if(b.name!=username && !admin){

alert("You can only delete your own booking");

return;

}


await deleteDoc(

doc(db,"startingDays",b.id)

);



}





window.clearAll=async function(){



let snap=await getDocs(
collection(db,"startingDays")
);



snap.forEach(async d=>{

await deleteDoc(
doc(db,"startingDays",d.id)
);

});


}








onSnapshot(

collection(db,"startingDays"),

snap=>{


bookings=[];


snap.forEach(d=>{


bookings.push({

id:d.id,

...d.data()

});


});



draw();



}

);



</script>


</body>

</html>
