<!DOCTYPE html>
<html>

<head>

<title>Starting Day for DC5</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#0f2027,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}


.card{
background:white;
width:95%;
max-width:900px;
padding:25px;
border-radius:25px;
box-shadow:0 20px 50px #0005;
}


h1{
text-align:center;
}


input{
padding:12px;
width:100%;
border-radius:10px;
border:1px solid #ccc;
}


button{
padding:10px 15px;
border:0;
border-radius:10px;
cursor:pointer;
background:#203a43;
color:white;
}


.top{
display:flex;
gap:10px;
}


.header{
display:flex;
justify-content:space-between;
align-items:center;
}


.calendar{

display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;

}


.box{

min-height:100px;
border:1px solid #ddd;
border-radius:15px;
padding:8px;
background:#f8faff;

}


.box:hover{
background:#eef3ff;
}


.number{
font-weight:bold;
}


.person{

background:#203a43;
color:white;
border-radius:8px;
padding:4px;
margin-top:5px;
font-size:12px;
display:flex;
justify-content:space-between;
}


.delete{
background:#d9534f;
padding:3px 6px;
font-size:11px;
}


.admin{
background:#ffdddd;
padding:10px;
border-radius:12px;
margin:15px 0;
}

</style>


</head>


<body>


<div class="card">


<h1>Starting Day for DC5 🚀</h1>


<div id="login">

<input id="name" placeholder="Your name">


<br><br>

<button onclick="start()">
Enter Calendar
</button>

</div>



<div id="app" style="display:none">



<div class="header">


<button onclick="monthMove(-1)">
◀
</button>


<h2 id="title"></h2>


<button onclick="monthMove(1)">
▶
</button>


</div>



<div id="adminPanel"></div>



<div class="calendar" id="calendar"></div>


</div>


</div>




<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";


import {

getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";




const firebaseConfig={

apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:d56a37c93bf49f4c8b5bc8"

};


const app=initializeApp(firebaseConfig);

const db=getFirestore(app);



let username="";

let admin=false;

let current=new Date();

let bookings=[];




window.start=function(){


username=document.getElementById("name").value.trim();


if(!username)return alert("Enter name");


admin=username.toLowerCase()=="admin";


document.getElementById("login").style.display="none";

document.getElementById("app").style.display="block";



draw();


if(admin){

document.getElementById("adminPanel").innerHTML=

`
<div class="admin">

<b>ADMIN MODE</b><br><br>

<button onclick="clearAll()">
Clear Everything
</button>

</div>
`;

}



}





function draw(){


let cal=document.getElementById("calendar");

cal.innerHTML="";



document.getElementById("title").innerText=

current.toLocaleString(
"default",
{
month:"long",
year:"numeric"
});



let first=
new Date(
current.getFullYear(),
current.getMonth(),
1
).getDay();



for(let i=0;i<first;i++)
cal.innerHTML+="<div></div>";



let total=
new Date(
current.getFullYear(),
current.getMonth()+1,
0
).getDate();



for(let d=1;d<=total;d++){


let div=document.createElement("div");

div.className="box";


div.innerHTML=

`
<div class="number">${d}</div>
`;



bookings.forEach(b=>{


let date=new Date(b.date);


if(

date.getDate()==d &&
date.getMonth()==current.getMonth() &&
date.getFullYear()==current.getFullYear()

){


let p=document.createElement("div");

p.className="person";


p.innerHTML=

`

${b.name}

<button class="delete">
X
</button>

`;



p.querySelector("button")
.onclick=()=>removeBooking(b);



div.appendChild(p);



}


});



div.onclick=()=>addBooking(d);



cal.appendChild(div);


}



}



async function addBooking(day){


let chosen=new Date(

current.getFullYear(),
current.getMonth(),
day

);



await addDoc(
collection(db,"startingDays"),
{

name:username,

date:chosen.toISOString()

}

);


}




async function removeBooking(b){


if(
b.name!=username &&
!admin
){

alert("You can only delete your own booking");

return;

}


await deleteDoc(
doc(db,"startingDays",b.id)
);


}





window.monthMove=function(x){

current.setMonth(
current.getMonth()+x
);

draw();

}





window.clearAll=async function(){


if(!admin)return;


if(!confirm("Delete everything?"))
return;


let snap=await getDocs(
collection(db,"startingDays")
);


snap.forEach(async d=>{

await deleteDoc(
doc(db,"startingDays",d.id)
);

});


}





onSnapshot(

collection(db,"startingDays"),

snap=>{


bookings=[];


snap.forEach(d=>{

bookings.push({

id:d.id,
...d.data()

});

});


draw();


}

);



</script>


</body>

</html>
