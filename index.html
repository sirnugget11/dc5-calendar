<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Starting Day for DC5</title>


<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');


*{
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}


body{

margin:0;
height:100vh;

background:
radial-gradient(circle at top,#1d7b91,#061923);

display:flex;
align-items:center;
justify-content:center;

padding:20px;

}



.container{

width:100%;
max-width:1100px;

height:90vh;

background:rgba(255,255,255,.92);

border-radius:32px;

padding:30px;

box-shadow:
0 30px 80px #0007;

display:flex;

flex-direction:column;

}




.logo{

text-align:center;

}


.logo h1{

margin:0;

font-size:clamp(28px,5vw,48px);

font-weight:800;

color:#092f3d;

}


.logo p{

color:#64748b;

}





input{

width:min(500px,90%);

padding:18px;

font-size:18px;

border-radius:18px;

border:2px solid #dce7ed;

outline:none;

}



button{

background:#092f3d;

color:white;

border:none;

border-radius:14px;

padding:13px 22px;

cursor:pointer;

font-weight:700;

transition:.2s;

}



button:hover{

transform:translateY(-2px);

}




.login{

flex:1;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

gap:25px;

}





#calendarApp{

display:none;

height:100%;

flex-direction:column;

}




.toolbar{

display:flex;

align-items:center;

justify-content:space-between;

margin:20px 0;

}



.month{

font-size:24px;

font-weight:800;

color:#092f3d;

}





.weekdays{

display:grid;

grid-template-columns:repeat(7,1fr);

text-align:center;

font-weight:700;

color:#64748b;

margin-bottom:8px;

}





.calendar{

flex:1;

display:grid;

grid-template-columns:repeat(7,1fr);

grid-template-rows:repeat(6,1fr);

border-radius:22px;

overflow:hidden;

border:1px solid #d9e3e8;

}





.box{

position:relative;

background:white;

border-right:1px solid #e5edf2;

border-bottom:1px solid #e5edf2;

padding:8px;

transition:.2s;

}




.box:hover:not(.disabled){

background:#f0fbff;

transform:scale(.98);

cursor:pointer;

}



.box:hover:not(.disabled)::after{

content:"+ Add";

position:absolute;

bottom:8px;

right:8px;

background:#092f3d;

color:white;

padding:4px 8px;

border-radius:20px;

font-size:11px;

}




.number{

font-weight:800;

color:#092f3d;

}




.disabled{

background:#f1f5f9;

color:#94a3b8;

pointer-events:none;

}




.people{

position:absolute;

top:30px;

bottom:5px;

left:5px;

right:5px;

overflow:auto;

}




.person{

background:#092f3d;

color:white;

border-radius:10px;

padding:5px;

margin-bottom:5px;

font-size:12px;

display:flex;

justify-content:space-between;

align-items:center;

}




.delete{

background:#ef4444;

padding:3px 8px;

font-size:11px;

}



.admin{

background:#fff1f2;

padding:12px;

border-radius:15px;

}




@media(max-width:600px){


.container{

height:95vh;

padding:15px;

}



.weekdays{

font-size:12px;

}


.box{

padding:4px;

}


.person{

font-size:9px;

}



.logo h1{

font-size:25px;

}



}



</style>

</head>


<body>



<div class="container">



<div class="logo">

<h1>
Starting Day for DC5 🚀
</h1>

<p>
Choose your starting day
</p>

</div>




<div id="login" class="login">


<input 
id="nameInput"
placeholder="Your name">


<button id="enterButton">
Enter Calendar
</button>


</div>






<div id="calendarApp">



<div id="adminPanel"></div>




<div class="toolbar">


<button id="prevBtn">
←
</button>



<div class="month" id="monthTitle"></div>



<button id="nextBtn">
→
</button>



</div>





<div class="weekdays">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>




<div class="calendar" id="calendar"></div>




</div>


</div>





<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";


import {

getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";




const firebaseConfig={


apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:d56a37c93bf49f4c8b5bc8"

};





const app=initializeApp(firebaseConfig);

const db=getFirestore(app);




let username="";

let admin=false;

let current=new Date();

let bookings=[];





enterButton.onclick=()=>{


username=nameInput.value.trim();


if(!username)return;


admin=username.toLowerCase()=="admin";


login.style.display="none";

calendarApp.style.display="flex";



if(admin){

adminPanel.innerHTML=

`
<div class="admin">

<b>Admin Mode</b>

<br><br>

<button id="clearBtn">
Clear All
</button>

</div>
`;

clearBtn.onclick=clearAll;

}


draw();


};







function draw(){


calendar.innerHTML="";


monthTitle.innerText=current.toLocaleString(

"default",
{
month:"long",
year:"numeric"
}

);




let today=new Date();

today.setHours(0,0,0,0);



let first=new Date(
current.getFullYear(),
current.getMonth(),
1
).getDay();



for(let i=0;i<first;i++)
calendar.innerHTML+="<div></div>";





let days=new Date(

current.getFullYear(),
current.getMonth()+1,
0

).getDate();





for(let d=1;d<=days;d++){



let box=document.createElement("div");

box.className="box";



let date=new Date(
current.getFullYear(),
current.getMonth(),
d
);



date.setHours(0,0,0,0);



if(date<today)

box.classList.add("disabled");




box.innerHTML=

`
<div class="number">${d}</div>
<div class="people"></div>
`;




let people=box.querySelector(".people");



bookings.forEach(b=>{


let bd=new Date(b.date);



if(

bd.getDate()==d &&
bd.getMonth()==current.getMonth() &&
bd.getFullYear()==current.getFullYear()

){


let p=document.createElement("div");

p.className="person";


p.innerHTML=b.name;



if(admin||b.name==username){


let x=document.createElement("button");

x.className="delete";

x.innerText="×";


x.onclick=e=>{

e.stopPropagation();

removeBooking(b);

};



p.appendChild(x);

}


people.appendChild(p);


}



});




box.onclick=()=>{

if(!box.classList.contains("disabled"))

addBooking(d);

};



calendar.appendChild(box);



}


}





prevBtn.onclick=()=>{


let now=new Date();


if(current<=new Date(now.getFullYear(),now.getMonth(),1))
return;


current.setMonth(current.getMonth()-1);

draw();


};





nextBtn.onclick=()=>{

current.setMonth(current.getMonth()+1);

draw();

};





async function addBooking(day){


await addDoc(
collection(db,"startingDays"),

{

name:username,

date:new Date(

current.getFullYear(),
current.getMonth(),
day

).toISOString()

});


}





async function removeBooking(b){


if(!admin&&b.name!=username)return;


await deleteDoc(
doc(db,"startingDays",b.id)
);


}





async function clearAll(){


let snap=await getDocs(
collection(db,"startingDays")
);



snap.forEach(d=>

deleteDoc(
doc(db,"startingDays",d.id)
)

);


}







onSnapshot(

collection(db,"startingDays"),

snap=>{


bookings=[];


snap.forEach(d=>{

bookings.push({

id:d.id,

...d.data()

});

});


draw();


});


</script>


</body>

</html>
