<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Starting Day for DC5</title>


<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');


*{
box-sizing:border-box;
font-family:Inter,sans-serif;
}


body{

margin:0;
height:100vh;

background:linear-gradient(135deg,#061923,#16758a);

display:flex;
align-items:center;
justify-content:center;

padding:15px;

}



.container{

width:100%;
max-width:1200px;

height:90vh;

background:white;

border-radius:28px;

padding:25px;

box-shadow:0 30px 70px #0007;

display:flex;
flex-direction:column;

}



h1{

text-align:center;

color:#092f3d;

margin:0;

font-size:clamp(25px,5vw,42px);

}



.subtitle{

text-align:center;
color:#64748b;

margin-bottom:15px;

}




#login{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:20px;

}




input,textarea{

width:100%;

padding:14px;

border-radius:14px;

border:2px solid #dbe5ea;

font-size:16px;

}



textarea{

height:90px;

resize:none;

}




button{

background:#092f3d;

color:white;

border:0;

border-radius:12px;

padding:12px 18px;

cursor:pointer;

font-weight:bold;

}



button:hover{

opacity:.85;

}





#calendarApp{

display:none;

height:100%;

}




.layout{

display:flex;

height:100%;

gap:20px;

}




.sidebar{

width:240px;

background:#f1f7fa;

border-radius:20px;

padding:20px;

}



.sidebar h2{

margin-top:0;

color:#092f3d;

}




#menuDescription{

color:#475569;

line-height:1.5;

}



.adminBox{

background:#ffe9ec;

padding:15px;

border-radius:15px;

margin-top:20px;

}





.main{

flex:1;

display:flex;

flex-direction:column;

}




.toolbar{

display:flex;

justify-content:space-between;

align-items:center;

}



.month{

font-size:24px;

font-weight:800;

color:#092f3d;

}





.weekdays{

display:grid;

grid-template-columns:repeat(7,1fr);

text-align:center;

font-weight:bold;

color:#64748b;

}



.calendar{

flex:1;

display:grid;

grid-template-columns:repeat(7,1fr);

grid-template-rows:repeat(6,1fr);

border:1px solid #ddd;

border-radius:20px;

overflow:hidden;

}





.box{

position:relative;

border-right:1px solid #ddd;

border-bottom:1px solid #ddd;

padding:8px;

background:#fff;

}



.box:hover:not(.disabled){

background:#eefaff;

cursor:pointer;

}



.box:hover:not(.disabled)::after{

content:"+ Add";

position:absolute;

right:6px;

bottom:6px;

font-size:11px;

background:#092f3d;

color:white;

padding:5px 8px;

border-radius:20px;

}



.disabled{

background:#eee;

pointer-events:none;

}




.people{

position:absolute;

top:28px;

bottom:5px;

left:5px;

right:5px;

overflow:auto;

}




.person{

background:#092f3d;

color:white;

padding:5px;

border-radius:8px;

margin-bottom:5px;

font-size:12px;

display:flex;

justify-content:space-between;

}




.delete{

background:#ef4444;

padding:3px 8px;

}




@media(max-width:750px){


.layout{

flex-direction:column;

}


.sidebar{

width:100%;

}


.calendar{

min-height:420px;

}


}

</style>


</head>


<body>


<div class="container">


<h1>
Starting Day for DC5 🚀
</h1>


<div class="subtitle">
Choose your starting day
</div>




<div id="login">


<input id="nameInput"
placeholder="Your name">


<button id="enterButton">
Enter Calendar
</button>


</div>





<div id="calendarApp">



<div class="layout">



<div class="sidebar">


<h2 id="menuTitle">
Information
</h2>


<p id="menuDescription">
No information yet.
</p>



<div id="adminControls"></div>



</div>





<div class="main">



<div class="toolbar">


<button id="prevBtn">
←
</button>


<div class="month" id="monthTitle"></div>


<button id="nextBtn">
→
</button>


</div>




<div class="weekdays">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>



<div id="calendar" class="calendar"></div>



</div>



</div>


</div>

</div>






<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";


import {

getFirestore,
collection,
doc,
setDoc,
getDocs,
addDoc,
deleteDoc,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";





const firebaseConfig={

apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:d56a37c93bf49f4c8b5bc8"

};




const app=initializeApp(firebaseConfig);

const db=getFirestore(app);





let username="";

let admin=false;

let current=new Date();

let bookings=[];







enterButton.onclick=()=>{


username=nameInput.value.trim();



if(!username)return;



admin=username.toLowerCase()=="admin";


login.style.display="none";

calendarApp.style.display="block";





if(admin){


adminControls.innerHTML=`

<div class="adminBox">


<input id="menuInput"
placeholder="Menu title">


<textarea id="descInput"
placeholder="Description"></textarea>


<button id="saveMenu">
Save Menu
</button>


<button id="clearBtn">
Clear All
</button>


</div>

`;



saveMenu.onclick=saveMenu;


clearBtn.onclick=clearAll;


}



draw();


};









function draw(){


calendar.innerHTML="";


monthTitle.innerText=current.toLocaleString(
"default",
{
month:"long",
year:"numeric"
}
);



let first=new Date(

current.getFullYear(),
current.getMonth(),
1

).getDay();



for(let i=0;i<first;i++)
calendar.innerHTML+="<div></div>";




let total=new Date(

current.getFullYear(),
current.getMonth()+1,
0

).getDate();




for(let d=1;d<=total;d++){


let box=document.createElement("div");

box.className="box";


box.innerHTML=`

<div>${d}</div>

<div class="people"></div>

`;



let date=new Date(

current.getFullYear(),
current.getMonth(),
d

);



if(date < new Date().setHours(0,0,0,0))

box.classList.add("disabled");



let people=box.querySelector(".people");



bookings.forEach(b=>{


let bd=new Date(b.date);



if(

bd.getDate()==d &&

bd.getMonth()==current.getMonth() &&

bd.getFullYear()==current.getFullYear()

){


let p=document.createElement("div");

p.className="person";


p.innerHTML=b.name;



if(admin || b.name==username){


let x=document.createElement("button");

x.className="delete";

x.innerText="×";


x.onclick=e=>{

e.stopPropagation();

deleteBooking(b);

};


p.appendChild(x);

}



people.appendChild(p);



}



});





box.onclick=()=>{

if(!box.classList.contains("disabled"))

addBooking(d);

};



calendar.appendChild(box);



}


}








async function addBooking(day){


await addDoc(

collection(db,"startingDays"),

{

name:username,

date:new Date(

current.getFullYear(),

current.getMonth(),

day

).toISOString()

}

);


}






async function deleteBooking(b){


if(!admin && b.name!=username)return;


await deleteDoc(

doc(db,"startingDays",b.id)

);


}







async function clearAll(){


let snap=await getDocs(

collection(db,"startingDays")

);


snap.forEach(d=>

deleteDoc(
doc(db,"startingDays",d.id)
)

);


}







async function saveMenu(){


await setDoc(

doc(db,"settings","menu"),

{

title:menuInput.value,

description:descInput.value

}

);


}





prevBtn.onclick=()=>{


current.setMonth(current.getMonth()-1);

draw();


};



nextBtn.onclick=()=>{


current.setMonth(current.getMonth()+1);

draw();


};






onSnapshot(

collection(db,"startingDays"),

snap=>{


bookings=[];


snap.forEach(d=>{

bookings.push({

id:d.id,

...d.data()

});

});


draw();


}

);






onSnapshot(

doc(db,"settings","menu"),

snap=>{


if(snap.exists()){


menuTitle.innerText=snap.data().title;


menuDescription.innerText=snap.data().description;


}


}

);



</script>

</body>

</html>
