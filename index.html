<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="favicon.ico" type="image/x-icon">    
<title>Starting Day for DC5</title>


<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');


*{
box-sizing:border-box;
font-family:Inter,sans-serif;
}


body{

margin:0;
height:100vh;

background:linear-gradient(135deg,#061923,#16758a);

display:flex;
justify-content:center;
align-items:center;

padding:15px;

}



.container{

width:100%;
max-width:1200px;

height:90vh;

background:white;

border-radius:28px;

padding:25px;

box-shadow:0 30px 70px #0008;

display:flex;

flex-direction:column;

}



h1{

text-align:center;

color:#092f3d;

margin:0;

}



.subtitle{

text-align:center;

color:#64748b;

margin-bottom:20px;

}




#login{

flex:1;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

gap:20px;

}

#warning{
    text-align:center;
    color:#dc2626;
    font-weight:bold;
    min-height:24px;
    margin-bottom:12px;
    opacity:0;
    transition:.25s;
}

#warning.show{
    opacity:1;
}

input,textarea{

padding:14px;

border-radius:14px;

border:2px solid #dbe5ea;

font-size:16px;

width:100%;

}



textarea{

height:90px;

}



button{

background:#092f3d;

color:white;

border:0;

border-radius:12px;

padding:12px 18px;

cursor:pointer;

font-weight:bold;

}



button:hover{

opacity:.85;

}





#calendarApp{

display:none;

height:100%;

}



.layout{

display:flex;

height:100%;

gap:20px;

}




.sidebar{

width:250px;

background:#f1f7fa;

border-radius:20px;

padding:20px;

}



.sidebar h2{

color:#092f3d;

}




#menuDescription{

color:#475569;

line-height:1.5;

}




.adminBox{

margin-top:20px;

background:#ffe7eb;

padding:15px;

border-radius:15px;

}




.main{

flex:1;

display:flex;

flex-direction:column;

}





.toolbar{

display:flex;

justify-content:space-between;

align-items:center;

}




.month{

font-size:24px;

font-weight:800;

color:#092f3d;

}





.weekdays{

display:grid;

grid-template-columns:repeat(7,1fr);

text-align:center;

font-weight:bold;

color:#64748b;

}



.calendar{

flex:1;

display:grid;

grid-template-columns:repeat(7,1fr);

grid-template-rows:repeat(6,1fr);

border:1px solid #ddd;

border-radius:20px;

overflow:hidden;

}




.box{

position:relative;

padding:8px;

border-right:1px solid #ddd;

border-bottom:1px solid #ddd;

background:#fff;

}



.box:hover:not(.disabled){
    background:#eefaff;
}

.dayHeader{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.addBtn{
    padding:2px 8px;
    font-size:12px;
    border-radius:8px;
    background:#092f3d;
    color:white;
    border:0;
    cursor:pointer;
}

.addBtn:hover{
    opacity:.85;
}



.disabled{

background:#eee;

/* Removed pointer-events:none to allow proper interaction */
}



.people{

position:absolute;

top:25px;

bottom:5px;

left:5px;

right:5px;

overflow:auto;

}




.person{

background:#092f3d;

color:white;

border-radius:8px;

padding:5px;

margin-bottom:5px;

font-size:12px;

display:flex;

justify-content:space-between;

}




.delete{

background:#ef4444;

padding:3px 8px;

}





@media(max-width:750px){


.layout{

flex-direction:column;

}



.sidebar{

width:100%;

}



.calendar{

min-height:400px;

}


}



</style>


</head>




<body>


<div class="container">


<h1>
Starting Day for DC5 🚀
</h1>


<div class="subtitle">
Choose your starting day
</div>

<div id="warning"></div>





<div id="login">


<input id="nameInput" placeholder="Your name">


<button id="enterButton">
Enter Calendar
</button>


</div>








<div id="calendarApp">



<div class="layout">



<div class="sidebar">


<h2 id="menuTitle">
Information
</h2>


<p id="menuDescription">
No information yet.
</p>




<div id="adminControls"></div>



</div>







<div class="main">



<div class="toolbar">


<button id="prevBtn">
←
</button>



<div class="month" id="monthTitle"></div>



<button id="nextBtn">
→
</button>



</div>





<div class="weekdays">

<div>Sun</div>
<div>Mon</div>
<div>Tue</div>
<div>Wed</div>
<div>Thu</div>
<div>Fri</div>
<div>Sat</div>

</div>




<div id="calendar" class="calendar"></div>




</div>




</div>


</div>



</div>









<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";



import {

getFirestore,
collection,
doc,
setDoc,
addDoc,
deleteDoc,
getDocs,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";





const firebaseConfig={


apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:1234567890abcdef123456"

};




// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);




#login{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
}

#enterButton {
    width: 200px;
    padding: 12px;
    font-size: 18px;
}

#nameInput {
    width: 200px;
    padding: 12px;
    font-size: 16px;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background-color: #ddd;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
}

.box {
    background-color: white;
    min-height: 80px;
    padding: 8px;
    position: relative;
    display: flex;
    flex-direction: column;
}

.dayHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
}

.addBtn {
    padding: 2px 8px;
    font-size: 12px;
    background-color: #092f3d;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

.addBtn:hover {
    opacity: 0.8;
}

.people {
    flex-grow: 1;
    overflow-y: auto;
    max-height: 60px;
    padding-top: 5px;
}

.person {
    background-color: #092f3d;
    color: white;
    border-radius: 4px;
    padding: 3px 8px;
    margin-bottom: 3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
}

.delete {
    background-color: #ef4444;
    border: none;
    color: white;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    cursor: pointer;
    padding: 0;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.disabled {
    background-color: #eee;
}

.disabled .addBtn {
    display: none;
}

/* Add some responsive adjustments */
@media (max-width: 768px) {
    .calendar {
        grid-template-columns: repeat(7, 1fr);
        gap: 0.5px;
    }
    
    .box {
        min-height: 60px;
        padding: 4px;
    }
    
    .person {
        font-size: 10px;
        padding: 2px 6px;
    }
}

</script>


</body>

</html>
