<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Starting Day for DC5</title>


<style>

*{
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}


html,body{

margin:0;
width:100%;
height:100%;
overflow:hidden;

}


body{

background:linear-gradient(135deg,#08202b,#17617c);

display:flex;
align-items:center;
justify-content:center;

padding:10px;

}



.card{

width:100%;
height:100%;

max-width:1000px;
max-height:900px;

background:white;

border-radius:24px;

padding:20px;

display:flex;
flex-direction:column;

box-shadow:0 20px 50px #0006;

}



h1{

text-align:center;

margin:5px;

color:#123746;

font-size:clamp(20px,4vw,32px);

}



input{

width:100%;
padding:14px;

border-radius:12px;

border:1px solid #ccc;

font-size:16px;

}



button{

background:#123746;

color:white;

border:0;

border-radius:10px;

padding:10px 14px;

cursor:pointer;

}



.header{

display:flex;

justify-content:space-between;

align-items:center;

height:45px;

flex-shrink:0;

}



.calendar{

flex:1;

display:grid;

grid-template-columns:repeat(7,1fr);

grid-template-rows:repeat(6,1fr);

border:1px solid #ccc;

border-radius:14px;

overflow:hidden;

min-height:0;

}



.box{

position:relative;

border-right:1px solid #ddd;

border-bottom:1px solid #ddd;

padding:5px;

background:#fafcff;

overflow:hidden;

}



.box:nth-child(7n){

border-right:none;

}



.number{

font-weight:bold;

font-size:14px;

}



.disabled{

background:#ededed;

color:#999;

pointer-events:none;

}



.people{

position:absolute;

top:24px;

left:4px;

right:4px;

bottom:4px;

overflow:auto;

}



.person{

background:#123746;

color:white;

border-radius:7px;

padding:3px 5px;

margin-bottom:3px;

font-size:11px;

display:flex;

justify-content:space-between;

align-items:center;

}



.delete{

padding:2px 5px;

font-size:10px;

background:#e74c3c;

}



.admin{

background:#ffe5e5;

padding:8px;

border-radius:10px;

}



@media(max-width:600px){


.card{

padding:10px;

border-radius:15px;

}



h1{

font-size:20px;

}


.box{

padding:3px;

}


.number{

font-size:11px;

}


.person{

font-size:9px;

padding:2px;

}


button{

padding:8px;

}



}



</style>

</head>


<body>


<div class="card">



<div id="login">


<h1>
Starting Day for DC5 🚀
</h1>


<input id="name" placeholder="Your name">


<br><br>


<button onclick="start()">
Enter
</button>


</div>




<div id="app" style="display:none; height:100%; flex-direction:column;">


<h1>
Starting Day for DC5 🚀
</h1>



<div id="adminPanel"></div>



<div class="header">


<button onclick="monthMove(-1)">
◀
</button>


<h2 id="title"></h2>


<button onclick="monthMove(1)">
▶
</button>


</div>




<div class="calendar" id="calendar"></div>




</div>


</div>






<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
onSnapshot,
deleteDoc,
doc,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";




const firebaseConfig={


apiKey:"AIzaSyAR8EByZhPKm8Miqwwh_1wM2oruBoncCkU",

authDomain:"dc5-calendar.firebaseapp.com",

projectId:"dc5-calendar",

storageBucket:"dc5-calendar.firebasestorage.app",

messagingSenderId:"102677604313",

appId:"1:102677604313:web:d56a37c93bf49f4c8b5bc8"

};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);




let username="";

let admin=false;

let current=new Date();

let bookings=[];






window.start=function(){


username=name.value.trim();



if(!username)return;


admin=username.toLowerCase()=="admin";


login.style.display="none";

app.style.display="flex";



if(admin){


adminPanel.innerHTML=

`

<div class="admin">

Admin Mode

<br><br>

<button onclick="clearAll()">
Clear All
</button>

</div>

`;

}



draw();

}








function draw(){


calendar.innerHTML="";


title.innerText=current.toLocaleString(

"default",

{
month:"long",
year:"numeric"
}

);



let today=new Date();

today.setHours(0,0,0,0);




let start=new Date(

current.getFullYear(),

current.getMonth(),

1

).getDay();



for(let i=0;i<start;i++)
calendar.innerHTML+="<div></div>";





let days=new Date(

current.getFullYear(),

current.getMonth()+1,

0

).getDate();





for(let d=1;d<=days;d++){


let box=document.createElement("div");

box.className="box";



let date=new Date(

current.getFullYear(),

current.getMonth(),

d

);



date.setHours(0,0,0,0);



if(date<today)
box.classList.add("disabled");



box.innerHTML=

`

<div class="number">${d}</div>

<div class="people"></div>

`;



let people=box.querySelector(".people");



bookings.forEach(b=>{


let bd=new Date(b.date);



if(

bd.getDate()==d &&

bd.getMonth()==current.getMonth() &&

bd.getFullYear()==current.getFullYear()

){


let p=document.createElement("div");


p.className="person";


p.innerHTML=b.name;



if(admin || b.name==username){


let x=document.createElement("button");

x.className="delete";

x.innerText="X";


x.onclick=(e)=>{

e.stopPropagation();

removeBooking(b);

};


p.appendChild(x);


}



people.appendChild(p);


}



});



if(date>=today){

box.onclick=()=>addBooking(d);

}



calendar.appendChild(box);


}



}








window.monthMove=function(x){


let n=new Date(current);


n.setMonth(n.getMonth()+x);


let now=new Date();


if(n < new Date(now.getFullYear(),now.getMonth(),1))
return;


current=n;


draw();


}






async function addBooking(day){


await addDoc(

collection(db,"startingDays"),

{

name:username,

date:new Date(

current.getFullYear(),

current.getMonth(),

day

).toISOString()

}

);


}







async function removeBooking(b){


await deleteDoc(

doc(db,"startingDays",b.id)

);

}





window.clearAll=async function(){


let snap=await getDocs(
collection(db,"startingDays")
);



snap.forEach(d=>deleteDoc(
doc(db,"startingDays",d.id)
));


}






onSnapshot(

collection(db,"startingDays"),

snap=>{


bookings=[];


snap.forEach(d=>{

bookings.push({

id:d.id,

...d.data()

});

});


draw();


}

);



</script>


</body>

</html>
